
<div class="card mb-4 mb-4 mb-md-0">
    <div class="card-body">
        <h4 class="text-center text-primary">{{isInEditMode ? 'Update':'Add Student'}}</h4>
        <form #stdForm="ngForm" (ngSubmit)="onstdsubmit()" class="text-primary">
            <div class="form-group">
            <label for="FullName">FullName</label>
            <input name="Fullname" required ngModel type="text" class="form-control">

            </div>
            <div class="form-group">
            <label for="Email">Email</label>
         <input name="Email" required ngModel type="text" class="form-control">

            </div>
             <div class="form-group">
            <label for="contact">contact</label>
            <input name="contact" required ngModel type="text" class="form-control">

            </div>
             <div class="form-group">
            <label for="IsActive">IsActive</label>
            <select type="text" required NgModel class="form-control">
                <option value="true">
                   yes
                </option>
                <option value="false">
                     No
                </option>
            </select>
                  </div>
            <button [disabled]="stdForm.invalid" *ngIf="!isInEditMode" mat-raised-button color="primary" class="w-100">Add Student</button>
            <button (click)="onUpdate()" type="button" *ngIf="isInEditMode" mat-raised-button color="warn" class="w-100">Update</button>
        </form>

    </div>

</div>
