
<mat-card>
<div class="card mb-4">
    <div class="card-body">
        <div class="form-group">
            <label for="todoItem">Todo Item</label>
            <input type="text" #todoItem class="form-control">

        </div>
   
        <button *ngIf="!isInEditMode" (click)="onTodoAdd()" mat-raised-button color="primary" class="btn-block">Add Todo</button>
        <button *ngIf="isInEditMode" (click)="onTodoUpdate()" mat-raised-button color="warn" class="btn-block">Update</button>

    </div>
</div>
</mat-card>
