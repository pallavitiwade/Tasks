    <mat-card>
    <ul class="list-group" *ngIf="getTodos.length > 0;else notodo">
        <li class="list-group-item d-flex justify-content-between" *ngFor="let todo of getTodos">
            <strong>
                {{todo.todoItem}}
            </strong>

            <div>
                <button
                (click)="onEdit(todo)"
                mat-mini-fab color="primary" class="mr-2"><mat-icon>edit</mat-icon></button>
                <button
                (click)="onTodoRemove(todo.todoId)"
                mat-mini-fab color="warn"><mat-icon>delete</mat-icon></button>
            </div>
        </li>
    </ul>

    <ng-template #notodo>
        <p class="alert alert-info">NO Todos Added Yet !!!</p>
    </ng-template>

</mat-card>
