 <div class="row">
    <div class="col-md-6">
       <app-o-form [getEditObj]="editTodoObj" (emitUpdateTodo)="emitUpdateTodo($event)"
            (emitNewTodo)="getNewTodo($event)"></app-o-form>
    </div>
    <div class="col-md-6">
        <app-o-list (emitEditTodo)="getEditTodo($event)" (emitRemovedId)="getRemovedId($event)"
            [getTodos]="todosArr"></app-o-list>

    </div>
</div>
