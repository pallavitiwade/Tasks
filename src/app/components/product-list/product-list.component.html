<ng-container *ngIf="ProductArr.length > 0; else nopro">
    <mat-card *ngFor="let pro of ProductArr ; trackBy trackByFun" class="mb-4">
        <mat-card-title>
            <h4>{{pro.pName}}</h4>
        </mat-card-title>
        <mat-card-content>
            <p>{{pro.Pdetail}}</p>
            <strong>{{pro.pStatus}}</strong>
        </mat-card-content>
        <mat-card-actions class="d-flex justify-content-between">
            <button (click)="onPstatusChange(pro.pId ,ProductEnum.Inprogress)" mat-raised-button  color="primary">Inprogress</button>
            <button (click)="onPstatusChange(pro.pId ,ProductEnum.Dispatch)" mat-raised-button  color="accent">Dispatch</button>
            <button (click)="onPstatusChange(pro.pId ,ProductEnum.Delivered)" mat-raised-button  color="warn">Delivered</button>
        </mat-card-actions>
    </mat-card>
</ng-container>
<ng-template #nopro>
    <p class="alert alert-info">No Product Added yet !!</p>
</ng-template>
